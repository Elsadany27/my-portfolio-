# Builds Flutter web and pushes it to the `gh-pages` branch.
#
# After the workflow runs successfully, set the site source ONCE:
#   Repo → Settings → Pages → Build and deployment
#   → Source: Deploy from a branch
#   → Branch: gh-pages  /  Folder: / (root)
#   → Save
#
# Then open: https://elsadany27.github.io/my-portfolio-/
# --base-href must match the repo name (my-portfolio-).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: |
          flutter build web --release \
            --base-href /my-portfolio-/ \
            --no-web-resources-cdn

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true
